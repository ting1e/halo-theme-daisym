apiVersion: theme.halo.run/v1alpha1
kind: Theme
metadata:
  name: theme-daisym
spec:
  displayName: theme daisym
  author:
    name: Joseph
    website: "https://elapse.cc"
  description: Halo 2.0 Theme base on Thymeleaf
  logo: "https://elapse.cc/upload/photo_2025-07-23_13-43-02.jpg"
  website: "https://elapse.cc"
  repo: "https://github.com/ting1e/halo-theme-daisym"
  settingName: "theme-daisym-setting"
  configMapName: "theme-daisym-configMap"
  version: '2.0.1'
  require: '2.8.0'
  customTemplates:
    page:
      - name: 个人页面
        description: 个人页面
        screenshot: 
        file: page_self.html
      - name: 文章列表
        description: 文章列表
        screenshot: 
        file: page_listall.html
      - name: 文章详情
        description: 文章详情
        screenshot: 
        file: page_article.html
      - name: 域名
        description: 域名列表
        screenshot: 
        file: page_domain.html
