<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
    th:replace="~{layout :: html(head = null,title='说说 - '+ ${site.title},content = ~{::content})}">


<th:block th:fragment="content">

    <style>
        @media (min-width: 1600px) {
            .memo-path-max-width {
                max-width: 900px;
            }
        }

        @media (min-width: 2200px) {
            .memo-path-max-width {
                max-width: 1200px;
            }
        }
    </style>


    <div class="flex flex-col lg:flex-row">
        <div class="flex flex-col lg:pl-[330px] w-full lg-left-none">
            <div
                class="memo-path-max-width page-title my-20 mx-auto lg:page-mqx-width w-full lg:px-[40px] flex flex-col space-y-3 lg-zone-max-w memo-path-max-width">
                <h1 class="text-4xl font-black subpixel-antialiased flex items-center space-x-4" id="fillTitle">
                    <div class="hover:text-black block hover:tracking-wider duration-300" data-no-instant="">瞬间
                    </div>
                    <div sec:authorize="isAuthenticated()">
                        <a href="/console/moments" target="_blank"
                            class="text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded-md transition-colors duration-200 inline-block font-normal">后台添加瞬间</a>
                    </div>
                </h1>
                <div sec:authorize="isAuthenticated()">
                    <div class="moment-publisher relative pt-12">
                    <textarea id="momentInput" 
                            placeholder="有什么想说的吗..." 
                            class="w-full h-32 p-3 pb-10 border border-gray-200 rounded-lg resize-none focus:outline-none focus:ring-1 focus:ring-gray-400 transition-all"
                    ></textarea>
                    
                    <button id="publishBtn" 
                            class="absolute right-2 bottom-2 bg-gray-200 hover:bg-gray-300 text-gray-600 px-3 py-1 m-1 text-sm rounded-md transition-colors duration-200">
                        发布瞬间
                    </button>
                    </div>
                    <div id="toast" class="hidden fixed top-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-black text-white text-sm rounded-full shadow-lg transition-opacity duration-300 z-50">
                    </div>

                </div>
                
            </div>

            <th:block th:if="${theme.config.basics.momentstyle} eq 'seperate' ">
                <th:block th:replace=~{::seperate} />
            </th:block>
            <th:block th:if="${theme.config.basics.momentstyle} eq 'combine' ">
                <th:block th:replace=~{::combine} />
            </th:block>

        </div>
    </div>


</th:block>

<th:block th:fragment="seperate">
    <div
        class="flex flex-col lg:flex-row w-full mx-auto lg:page-mqx-width lg:space-x-8 lg:px-[40px] memo-path-max-width">
        <div class="page-content  lg:w-[100%]">
            <div th:each="moment : ${moments.items}" th:with="content=${moment.spec.content}">

                <div class="page-item hover:shadow-lg duration-300 mb-12">
                    <div class="page-content bg-white p-8 flex flex-col space-y-3">
                        <div class="page-meta text-767676 text-base flex justify-between">
                            <div>
                                <span>[[${#dates.format(moment.spec.releaseTime,'yyyy-MM-dd HH:MM:ss')}]]</span>
                            </div>
                            <div class="flex">
                                <div style="padding-right: 30px;">
                                    <a class="flex space-x-2 block" title="点个赞"
                                        th:href="|javascript:handleLike('${moment.metadata.name}')|"
                                        th:data-moment-name="${moment.metadata.name}">
                                        <i class="ri-heart-line"></i>
                                        <span>[[${moment.stats.upvote}]]</span>
                                    </a>
                                </div>

                                <div class="journal-comment">

                                    <a class="flex space-x-2 block" title="评论一下" href="#">
                                        <i class="ri-chat-2-line"></i>
                                        <span>[[${moment.stats.approvedComment}]]</span>
                                    </a>

                                </div>

                            </div>


                        </div>
                        <div class="border-b border-gray-300 w-full"></div>
                        <div class="page-summary text-content">
                            <div class="moment-text-area">
                                <div th:if="${not #strings.isEmpty(content.html)}" th:utext="${content.html}">
                                </div>
                            </div>
                            <div class="moment-media-area">
                                <th:block th:if="${not #lists.isEmpty(content.medium)}"
                                    th:each="momentItem : ${content.medium}">
                                    <div class="moment-media-sep">
                                        <img th:if="${momentItem.type.name == 'PHOTO'}" th:src="${momentItem.url}" />
                                        <video th:if="${momentItem.type.name == 'VIDEO'}"
                                            th:src="${momentItem.url}"></video>
                                    </div>
                                </th:block>
                            </div>
                        </div>

                    </div>
                    <div class="journal-comment-div bg-white p-8 hover:shadow-lg  mb-12" hidden>
                        <halo-comment group="moment.halo.run" kind="Moment" th:attr="name=${moment.metadata.name}"
                            colorScheme="'light'" />
                    </div>
                </div>

            </div>
            <div th:replace="~{modules/pagination :: page('',${moments})}"></div>


        </div>
    </div>

</th:block>


<th:block th:fragment="combine">
    <div
        class="memo-path-max-width flex flex-col lg:flex-row w-full mx-auto lg:page-mqx-width lg:space-x-8 lg:px-[40px] lg-zone-max-w memo-path-max-width">
        <div class="page-content  lg:w-[100%]">
            <div class="page-item hover:shadow-lg duration-300 mb-12 px-8 bg-white pb-8">
                <div th:each="moment : ${moments.items}" th:with="content=${moment.spec.content}">
                    <div class="page-content  py-8 text-767676 flex flex-col space-y-3">
                        <div class="page-meta text-others text-base flex justify-between">
                            <div>
                                <span>[[${#dates.format(moment.spec.releaseTime,'yyyy-MM-dd HH:MM:ss')}]]</span>
                            </div>
                        </div>
                        <div class="page-summary text-content ">
                            <div class="moment-text-area">
                                <div th:if="${not #strings.isEmpty(content.html)}" th:utext="${content.html}">
                                </div>
                            </div>

                            <div class="moment-media-area">
                                <th:block th:if="${not #lists.isEmpty(content.medium)}"
                                    th:each="momentItem : ${content.medium}">
                                    <div class="moment-media">
                                        <img th:if="${momentItem.type.name == 'PHOTO'}" th:src="${momentItem.url}" />
                                        <video th:if="${momentItem.type.name == 'VIDEO'}"
                                            th:src="${momentItem.url}"></video>

                                    </div>
                                </th:block>
                            </div>
                        </div>

                        <div class="flex text-others justify-end">
                            <div style="padding-right: 15px;">
                                <a class="flex space-x-2 block" title="点个赞"
                                    th:href="|javascript:handleLike('${moment.metadata.name}')|"
                                    th:data-moment-name="${moment.metadata.name}">
                                    <i class="ri-heart-line"></i>
                                    <span>[[${moment.stats.upvote}]]</span>
                                </a>
                            </div>

                            <div class="journal-comment" style="padding-right: 15px;">

                                <a class="flex space-x-2 block" title="评论一下" style="cursor: pointer;">
                                    <i class="ri-chat-2-line"></i>
                                    <span>[[${moment.stats.approvedComment}]]</span>
                                </a>

                            </div>

                        </div>
                        <div class="journal-comment-div bg-white p-8 hover:shadow-lg  mb-12" hidden>
                            <halo-comment group="moment.halo.run" kind="Moment" th:attr="name=${moment.metadata.name}"
                                colorScheme="'light'" />
                        </div>

                    </div>


                    <div class="border-b border-gray-300 w-full"></div>

                </div>
            </div>
            <div th:replace="~{modules/pagination :: page('',${moments})}"></div>

        </div>
    </div>


</th:block>

</html>


<script>

    $(".journal-comment").click(function () {
        var that = $(this);
        var ele = that.parents().children('.journal-comment-div');
        ele.slideToggle();

    });

    const likes_localstorage_key = "higan.likes.moment.ids";
    let likedMomentNames = JSON.parse(localStorage.getItem(likes_localstorage_key) || "[]");
    likedMomentNames.forEach((momentName) => {
        activeUpvote(momentName);
    });
    function liked(momentName) {
        return likedMomentNames.includes(momentName);
    }
    function handleLike(momentName) {
        if (liked(momentName)) {
            return;
        }
        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/apis/api.halo.run/v1alpha1/trackers/upvote");
        xhr.onload = () => {
            likedMomentNames = [...likedMomentNames, momentName];
            localStorage.setItem(likes_localstorage_key, JSON.stringify(likedMomentNames));
            const likesNode = document.querySelector("a[data-moment-name='" + momentName + "'] span");
            const likes = parseInt(likesNode.innerText);
            likesNode.innerText = likes + 1;
            activeUpvote(momentName);
        };
        xhr.onerror = function () {
            alert("网络请求失败，请稍后再试");
        };
        xhr.setRequestHeader("Content-Type", "application/json;charset=UTF-8");
        xhr.send(
            JSON.stringify({
                group: "moment.halo.run",
                plural: "moments",
                name: momentName,
            })
        );
    }
    function activeUpvote(momentName) {
        var dom = document.querySelector("a[data-moment-name='" + momentName + "']");
        if (dom) {
            dom.style.color = "#e85600";
            dom.style.fontWeight = "500";
        }
    }

    const showToast = (message, duration = 2000) => {
    const toast = document.getElementById('toast');
    toast.innerText = message;
    toast.classList.remove('hidden');
    toast.style.opacity = '1';

    return new Promise(resolve => {
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => {
                toast.classList.add('hidden');
                resolve();
            }, 300);
        }, duration);
    });
};


document.getElementById('publishBtn').addEventListener('click', async () => {
    const content = document.getElementById('momentInput').value.trim();
    if (!content) return alert("内容不能为空");

    const btn = document.getElementById('publishBtn');
    btn.disabled = true;
    btn.innerText = "发送中...";

    // 组装 Halo API 要求的 Payload
    const payload = {
        spec: {
            content: {
                raw: `<p>${content}</p>`,
                html: `<p>${content}</p>`,
                medium: []
            },
            releaseTime: new Date().toISOString(),
            owner: "",
            visible: "PUBLIC",
            tags: [],
            approved: true
        },
        metadata: {
            generateName: "moment-",
            name: ""
        },
        kind: "Moment",
        apiVersion: "moment.halo.run/v1alpha1"
    };

    try {
        const response = await fetch("/apis/console.api.moment.halo.run/v1alpha1/moments", {
            method: "POST",
            headers: {
                "accept": "application/json",
                "content-type": "application/json",
                // 注意：在实际跨域请求中，浏览器会自动携带 Cookie，但需要服务器开启 CORS 允许
                "x-requested-with": "XMLHttpRequest"
            },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            await showToast("发布成功，正在刷新...");
            location.reload(); // 成功后刷新页面
        } else {
            const err = await response.json();
            await showToast("发布失败: " + (err.message || response.statusText));
        }
    } catch (error) {
        console.error("请求错误:", error);
        await showToast("网络请求异常");
    } finally {
        btn.disabled = false;
        btn.innerText = "发布瞬间";
    }
});

</script>
