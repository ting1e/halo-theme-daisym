
<th:block th:fragment="footer">
<div class="flex flex-col space-y-5">
    <div class="flex items-center text-767676 text-lg space-x-5">

        <a href="javascript:SearchWidget.open()"
            class="inline-flex hover:text-black hover:scale-110 transition-transform duration-300" title="搜索">
            <i class="ri-search-2-line"></i>
        </a>

        <a sec:authorize="isAnonymous()" href="javascript:void(0);"
            onclick="window.location.href = '/login?redirect_uri=' + encodeURIComponent(window.location.pathname + window.location.search);"
            class="inline-flex hover:text-black hover:scale-110 transition-transform duration-300" title="登录">
            <i class="ri-user-line"></i>
        </a>

        <a sec:authorize="isAuthenticated()" href="javascript:void(0);"
            onclick="window.location.href = '/logout?redirect_uri=' + encodeURIComponent(window.location.pathname + window.location.search);"
            class="inline-flex hover:text-black hover:scale-110 transition-transform duration-300" title="注销">
            <i class="ri-logout-box-r-line"></i>
        </a>

        <a sec:authorize="isAuthenticated()" href="/console" target="_blank"
            class="inline-flex hover:text-black hover:scale-110 transition-transform duration-300" title="管理后台">
            <i class="ri-dashboard-line"></i>
        </a>

    </div>


    <div class="copyright text-767676 flex items-center w-full">
        <div class="copyright">
            <a class="hover:text-black block w-full hover:tracking-wider duration-300"
                th:if="${not #strings.isEmpty(theme.config.basics.siteStartTime)}">
                © [[${#strings.arraySplit(theme.config.basics.siteStartTime, '-')[0]}]] - [[${#dates.format(new
                java.util.Date(), 'yyyy')}]] [[${theme.config.basics.site_author}]]
            </a>
            <a class="hover:text-black block w-full hover:tracking-wider duration-300"
                th:if="${#strings.isEmpty(theme.config.basics.siteStartTime)}">
                ©[[${#dates.format(new java.util.Date(), 'yyyy')}]] [[${theme.config.basics.site_author}]]
            </a>
            <a class="hover:text-black block w-full hover:tracking-wider duration-300">
                [[${theme.config.basics.site_icp}]]
            </a>
        </div>
    </div>

</div>
</th:block>
